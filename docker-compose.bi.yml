services:
  bi-postgres:
    image: postgres:16
    container_name: medical-chatbot-bi-postgres
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_password
      POSTGRES_DB: medical_chatbot_bi
    ports:
      - "5432:5432"
    volumes:
      - medical_chatbot_bi_postgres:/var/lib/postgresql/data

  superset:
    build:
      context: ./superset
    container_name: medical-chatbot-superset
    depends_on:
      - bi-postgres
    environment:
      SUPERSET_SECRET_KEY: medical-chatbot-superset-dev-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8088:8088"
    volumes:
      - medical_chatbot_superset_home:/app/superset_home

volumes:
  medical_chatbot_bi_postgres:
  medical_chatbot_superset_home:
