services:
  bi-postgres:
    image: postgres:16
    container_name: medical-chatbot-bi-postgres
    environment:
      POSTGRES_USER: ${BI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BI_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BI_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - medical_chatbot_bi_postgres:/var/lib/postgresql/data

  superset:
    build:
      context: ./superset
    container_name: medical-chatbot-superset
    depends_on:
      - bi-postgres
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_GUEST_TOKEN_JWT_SECRET: ${SUPERSET_GUEST_TOKEN_JWT_SECRET}
      SUPERSET_CORS_ORIGINS: ${SUPERSET_CORS_ORIGINS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8088:8088"
    volumes:
      - medical_chatbot_superset_home:/app/superset_home

volumes:
  medical_chatbot_bi_postgres:
  medical_chatbot_superset_home:
